run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert

linters-settings:
  errcheck:
    check-blank: false
    exclude-functions:
      - fmt.Sscanf
      - (io.Closer).Close
      - (net.Listener).Close

issues:
  exclude-rules:
    # Tests can be more relaxed
    - path: _test\.go
      linters:
        - errcheck
        - ineffassign
    # Exclude known noisy patterns in existing code
    - path: cmd/sandbox/main\.go
      text: "Error return value"
      linters:
        - errcheck
    - path: internal/sandbox/sandbox\.go
      text: "Error return value"
      linters:
        - errcheck
    - path: internal/missionengine/manager\.go
      text: "Error return value"
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
