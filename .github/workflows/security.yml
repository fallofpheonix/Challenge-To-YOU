name: Security Auditing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [ 'backend', 'phoenix' ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin the exact patch that fixes GO-2026-5856 (crypto/tls ECH leak);
          # the generic '1.25' resolves to 1.25.11 which still ships the CVE.
          go-version: '1.25.12'
          check-latest: true
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd ${{ matrix.module }}
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd ${{ matrix.module }}
          gosec ./...
