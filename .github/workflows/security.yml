name: Security Auditing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [ 'backend', 'phoenix' ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Pin the exact patch that fixes GO-2026-5856 (crypto/tls ECH leak);
          # the generic '1.25' resolves to 1.25.11 which still ships the CVE.
          go-version: '1.25.12'
          check-latest: true
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd ${{ matrix.module }}
          govulncheck ./...

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd ${{ matrix.module }}
          # Exclude rules that are inherent to this project's design, not defects:
          #   G204 - subprocess launched with a variable: the sandbox and the git
          #          wrapper exist specifically to run external programs.
          #   G304 - file opened from a variable path: config/memory/prompt loaders
          #          read files by computed path by definition.
          #   G122 - WalkDir path race: local single-user tooling, not a shared FS.
          # All other rules remain enforced (creds, SQLi, weak crypto, perms, etc.).
          # Gate at MEDIUM+ so idiomatic LOW findings (e.g. G104 on best-effort
          # Close()) do not block, while every MEDIUM/HIGH issue still fails CI.
          gosec -exclude=G204,G304,G122 -severity=medium ./...
