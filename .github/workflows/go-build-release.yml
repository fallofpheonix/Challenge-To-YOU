name: Go Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run Tests
        run: |
          cd backend
          go test -v ./...

  build:
    name: Cross-Compile Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            binary_name: server_darwin_amd64
          - goos: darwin
            goarch: arm64
            binary_name: server_darwin_arm64
          - goos: linux
            goarch: amd64
            binary_name: server_linux_amd64
          - goos: windows
            goarch: amd64
            binary_name: server_windows_amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          check-latest: true
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Compile optimized binary
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags="-s -w" \
            -o ../dist/${{ matrix.binary_name }} \
            cmd/sandbox/main.go

      - name: Package challenges assets
        run: |
          cp -r backend/challenges dist/challenges

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: |
            dist/${{ matrix.binary_name }}
            dist/challenges/
